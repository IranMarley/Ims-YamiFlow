# ── YamiFlow · Production Stack ───────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # fill in all values
#   docker compose pull && docker compose up -d

services:

  # ── Traefik (reverse proxy + TLS) ─────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: yamiflow-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_acme:/acme
    networks:
      - yamiflow
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: yamiflow-postgres
#    ports:
#      - "5432:5432"   # ← TEMP
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - yamiflow
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yamiflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - yamiflow
    restart: unless-stopped

  # ── API (.NET 10) ──────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GHCR_OWNER}/yamiflow-api:latest
    container_name: yamiflow-api
    tty: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${DB_NAME};
        Username=${DB_USER};Password=${DB_PASSWORD}
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: Ims.YamiFlow
      JwtSettings__Audience: Ims.YamiFlow.Clients
      JwtSettings__ExpirationHours: "8"
      JwtSettings__RefreshTokenExpirationDays: "30"
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Authentication__Facebook__AppId: ${FACEBOOK_APP_ID}
      Authentication__Facebook__AppSecret: ${FACEBOOK_APP_SECRET}
      Email__From: ${EMAIL_FROM}
      Email__SmtpHost: ${SMTP_HOST}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER}
      Email__SmtpPass: ${SMTP_PASS}
      Email__AppUrl: ${APP_URL}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET}
      Stripe__PlanMonthlyId: ${STRIPE_PLAN_MONTHLY_ID}
      Stripe__PlanAnnualId: ${STRIPE_PLAN_ANNUAL_ID}
      Serilog__MinimumLevel: Debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yamiflow
    restart: unless-stopped

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GHCR_OWNER}/yamiflow-frontend:latest
    container_name: yamiflow-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.yamiflow.es
      NEXT_PUBLIC_STRIPE_PLAN_MONTHLY_ID: ${STRIPE_PLAN_MONTHLY_ID}
      NEXT_PUBLIC_STRIPE_PLAN_ANNUAL_ID: ${STRIPE_PLAN_ANNUAL_ID}
    depends_on:
      - api
    networks:
      - yamiflow
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  traefik_acme:

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  yamiflow:
    driver: bridge
