name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/iranmarley/yamiflow-api
  FRONTEND_IMAGE: ghcr.io/iranmarley/yamiflow-frontend

jobs:
  # ── Build & push images ──────────────────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./web-client
          dockerfile: web-client/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.yamiflow.es
            NEXT_PUBLIC_STRIPE_PLAN_MONTHLY_ID=${{ secrets.STRIPE_PLAN_MONTHLY_ID }}
            NEXT_PUBLIC_STRIPE_PLAN_ANNUAL_ID=${{ secrets.STRIPE_PLAN_ANNUAL_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Deploy to server ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/yamiflow
            docker compose pull
            docker compose up -d
            docker image prune -f
