# ── Traefik v3 · Static Configuration ─────────────────────────────────────────

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

accessLog: {}

# ── Entry points ──────────────────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

# ── Providers ─────────────────────────────────────────────────────────────────
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: yamiflow

# ── TLS / Let's Encrypt ───────────────────────────────────────────────────────
certificatesResolvers:
  letsencrypt:
    acme:
      # !! Replace with your real email before first deploy !!
      email: iran_marley@live.com
      storage: /acme/acme.json
      # HTTP-01 challenge — requires port 80 reachable from the internet
      httpChallenge:
        entryPoint: web
