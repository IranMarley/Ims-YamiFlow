# ── Traefik v3 · Static Configuration ─────────────────────────────────────────

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

accessLog: {}

# ── Entry points ──────────────────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

# ── Providers ─────────────────────────────────────────────────────────────────
providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# ── Tracing ───────────────────────────────────────────────────────────────────
tracing:
  otlp:
    grpc:
      endpoint: "tempo:4317"
      insecure: true

# ── TLS / Let's Encrypt ───────────────────────────────────────────────────────
certificatesResolvers:
  letsencrypt:
    acme:
      email: iran_marley@live.com
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web

