global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'yamiflow-api'
    static_configs:
      - targets: ['api:8080']
    relabel_configs:
      - target_label: app
        replacement: yamiflow-api

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
