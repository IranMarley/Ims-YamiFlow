# ── YamiFlow · Development Stack ───────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: yamiflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yamiflow
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yamiflow-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    networks:
      - yamiflow
    restart: unless-stopped

  # ── API (.NET) ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yamiflow-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${DB_NAME};
        Username=${DB_USER};Password=${DB_PASSWORD}
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      JwtSettings__Secret: ${JWT_SECRET}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Email__From: ${EMAIL_FROM}
      Email__SmtpHost: ${SMTP_HOST}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER}
      Email__SmtpPass: ${SMTP_PASS}
      AppUrl: http://localhost:3000
      LOKI_URL: ${LOKI_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    volumes:
      - ./video_data:/var/videos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yamiflow
      - monitoring
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: yamiflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - yamiflow
    restart: unless-stopped

  # ── Tempo ─────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.1.1
    container_name: yamiflow-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    networks:
      - monitoring
      - yamiflow
    restart: unless-stopped

  # ── Loki ──────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: yamiflow-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - loki_wal_data:/wal
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - monitoring
      - yamiflow
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────
  grafana:
    image: grafana/grafana:9.5.2
    container_name: yamiflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - yamiflow
      - monitoring
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  grafana_data:
  loki_data:
  loki_wal_data:
  prometheus_data:
  tempo_data:
  video_data:

# ── Networks ────────────────────────────────────────
networks:
  yamiflow:
    driver: bridge
  monitoring:
    driver: bridge